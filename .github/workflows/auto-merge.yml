# Auto-Merge — der VOLLZUG von §9 (Variante B, serverseitig).
#
# Schaltet GitHubs natives Auto-Merge für PRs des Agent-Bots scharf. Der Merge passiert dann
# serverseitig durch GitHub, SOBALD alle Required Checks grün sind. Dieser Workflow entscheidet
# NICHT, OB gemergt wird — das tut die Branch Protection.
#
# Warum das §9 ohne eigenes Tier-Wissen umsetzt: der Required-Check `devloop-precondition-check`
# ist tier-gestuft und kapselt §9 bereits — er ist grün GENAU dann, wenn der PR nach §9 mergebar
# ist (T0/T1 ohne Approval; T2/T3 nur mit menschlichem CODEOWNER-Approval auf HEAD; geschützter
# Satz nie ohne Admin-Override). „Alle Required Checks grün" = „nach §9 mergebar". Also genügt es,
# Auto-Merge scharfzuschalten und GitHub die Bedingung prüfen zu lassen.
#
# Serverseitig => umgeht den lokalen, tier-blinden PreToolUse-Merge-Hook (devloop-Befund
# 2026-06-20): der Merge läuft mit GITHUB_TOKEN auf dem Runner, nicht über eine Agent-Shell.

name: auto-merge
on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  pull_request_review:
    types: [submitted]
  push:
    branches: [main]

# Least privilege: nur, was zum Scharfschalten + serverseitigen Merge nötig ist.
permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    # NUR PRs des Agent-Bots (der Produzent). Menschen-PRs mergt der Mensch selbst — kein
    # versehentliches Auto-Mergen fremder PRs. Drafts sind ausgenommen (Auto-Merge unzulässig).
    # NUR auf PR-/Review-Events (auf `push` ist github.event.pull_request leer → übersprungen).
    if: >-
      github.event_name != 'push'
      && github.event.pull_request.user.login == 'sir-tobys-usefull-helper-agent[bot]'
      && github.event.pull_request.draft == false
    steps:
      - name: Enable native auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        # Idempotent: ist Auto-Merge schon aktiv, ist der erneute Aufruf ein No-op-Fehler, den
        # wir schlucken. GitHub merged erst, wenn ALLE Required Checks (inkl. precondition-check) grün sind.
        run: gh pr merge "$PR" --auto --squash --repo "${{ github.repository }}" || true

  # Nach jedem Merge auf main: offene PRs mit scharfgeschaltetem Auto-Merge, die jetzt BEHIND
  # sind, per update-branch nachziehen. Bei strict Branch Protection ("require branches up to
  # date") feuert GitHubs natives Auto-Merge sonst NICHT — jeder nachrangige Serien-PR stockt,
  # bis sein Branch nachgezogen wird (devloop-Befund 2026-06-21, wallet-topup #29/#30: dort war
  # `gh pr update-branch` zweimal manuell nötig).
  update-behind-auto-merge-prs:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    # Sweeps serialisieren, statt sich zu überholen (kein cancel: jeder Merge soll wirken).
    concurrency:
      group: update-behind-auto-merge-prs
      cancel-in-progress: false
    steps:
      - name: Re-sync BEHIND auto-merge PRs to base
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        # Filter über `autoMergeRequest != null` statt Bot-Login: das ist das semantisch korrekte
        # Kriterium (PR WILL auto-mergen, ist aber blockiert) und umgeht die App-Login-Format-
        # Uneindeutigkeit (REST `…[bot]` vs. GraphQL `app/…`). Nur dieser Workflow schaltet Bot-PRs
        # scharf; ein Mensch, der selbst Auto-Merge aktiviert, profitiert harmlos mit.
        # update-branch auf einem bereits aktuellen Branch ist ein No-op-Fehler (kein neuer Commit,
        # kein Check-Re-Run) → mit `|| true` geschluckt. Deshalb ziehen wir ALLE armed PRs nach
        # (nicht nur die als BEHIND gemeldeten): race-frei gegenüber noch nicht berechnetem
        # mergeStateStatus direkt nach dem Merge.
        run: |
          set -o pipefail
          gh pr list --repo "$REPO" --state open --base main \
            --json number,autoMergeRequest \
            --jq '.[] | select(.autoMergeRequest != null) | .number' \
          | while read -r pr; do
              [ -z "$pr" ] && continue
              echo "Re-syncing PR #$pr to base"
              gh pr update-branch "$pr" --repo "$REPO" || true
            done
