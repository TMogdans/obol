# devloop binding anchor (b) — AUTHORITATIVE fail-closed required check (design §5.1/§10.1),
# jetzt TIER-GESTUFT (§9). Registriert als REQUIRED status check auf dem geschützten main.
#
# Das Tier wird NICHT hier abgeleitet, sondern aus Obols einziger Tier-Wahrheit konsumiert
# (`pnpm run tier` = tools/derive-tier-cli.ts gegen tools/tier-map.json). Das Gate selbst
# (tools/devloop-precondition-gate.mjs) verdrahtet dieses Tier mit devloops getesteter
# Approval-/Protected-Set-Logik:
#   - geschützter Satz berührt -> FAIL (immer; Mensch-Gate + Admin-Override)
#   - Tier T2 / T3             -> menschliches CODEOWNER-Approval auf HEAD nötig
#   - Tier T0 / T1             -> grün ohne Approval (§9-Auto-Merge; nichts freizugeben)
#
# Diese Datei MUSS die Zeichenkette "devloop-precondition-check" enthalten, damit
# checkGuardians() den Bindungs-Anker erkennt.
#
# Außerhalb dieses Workflows, via Branch Protection: KEIN globales Review mehr (die Review-
# Pflicht ist tier-gestuft in diesen Check verlagert); dieser Check ist Required.

name: devloop-precondition-check
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read
  pull-requests: read

jobs:
  devloop-precondition-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      # Bringt die git-gepinnte devloop-devDependency (das Gate importiert devloop/dist/core/*).
      - run: pnpm install --frozen-lockfile

      - name: Tier aus dem Diff (Obols einzige Tier-Wahrheit konsumieren, nicht ableiten)
        id: tier
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=50 || true
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
          TIER=$(printf '%s\n' "$CHANGED" | pnpm run --silent tier)
          echo "Tier: $TIER"
          echo "tier=$TIER" >> "$GITHUB_OUTPUT"
          echo "### devloop-precondition-check — Tier \`$TIER\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Tier-gestuftes Gate (protected-set immer; Approval nur T2/T3)
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          TIER: ${{ steps.tier.outputs.tier }}
        run: |
          # Reviews vom autoritativen, fälschungssicheren GitHub-Kanal.
          REVIEWS=$(gh api "repos/${{ github.repository }}/pulls/$PR/reviews" \
            --jq '[.[] | {user: .user.login, state: .state, commit_id: .commit_id}]')
          DIFF=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" | jq -R . | jq -s .)
          # humanReviewers = die CODEOWNERS-Logins (einzige Quelle: .github/CODEOWNERS) — so
          # zählt für T2/T3 weiterhin NUR ein CODEOWNER als gültiges Approval.
          OWNERS=$(grep -oE '@[A-Za-z0-9_-]+' .github/CODEOWNERS | sort -u | sed 's/@//' | jq -R . | jq -s .)
          jq -n \
            --arg tier "$TIER" \
            --argjson reviews "$REVIEWS" \
            --arg prAuthor "$AUTHOR" \
            --arg headSha "$HEAD_SHA" \
            --argjson botLogins "$(cat .devloop/bot-logins.json)" \
            --argjson humanReviewers "$OWNERS" \
            --argjson diffPaths "$DIFF" \
            --argjson protectedGlobs "$(cat .devloop/protected-globs.json)" \
            '{tier:$tier, reviews:$reviews, prAuthor:$prAuthor, headSha:$headSha, botLogins:$botLogins, humanReviewers:$humanReviewers, diffPaths:$diffPaths, protectedGlobs:$protectedGlobs}' \
            | node tools/devloop-precondition-gate.mjs
