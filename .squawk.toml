# Squawk — Postgres migration lint gate (Säule 2).
#
# Run: `pnpm run migrations` (== squawk --config .squawk.toml services/*/migrations/*.sql)
#
# pg_version pins the rule set to the Postgres major we target so that
# version-gated lints behave deterministically in CI.
pg_version = "16.0"

# The PgMigrator wraps every migration file in a transaction (sql.withTransaction).
# Telling squawk this lets it judge rules correctly instead of conservatively:
# it stops demanding `IF NOT EXISTS` (prefer-robust-stmts), because a migration
# that fails part way through rolls back atomically rather than half-applying.
assume_in_transaction = true

# There are deliberately NO global `excluded_rules`. An earlier version muted
# require-concurrent-index-creation / require-timeout-settings / prefer-robust-stmts
# here "for the bootstrap migration" — but a global mute silently exempts EVERY
# later migration too, which is exactly the kind of gap this gate exists to
# prevent. Bootstrap-only and genuinely-unavoidable exemptions now live as
# visible, per-statement `-- squawk-ignore` comments inside the migration files
# themselves, where a reviewer sees them in the diff.
